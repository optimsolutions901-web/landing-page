<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>OptimSolutions — For Duct Cleaning Companies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #0f4c3a;
    --green-mid:  #166b52;
    --green-soft: #ecf4f0;
    --ink:        #0d0d0d;
    --muted:      #3d3d3d;
    --light:      #6b7280;
    --line:       #e4e4e7;
    --bg:         #ffffff;
    --radius:     8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 40px 80px; }
  @media (max-width: 600px) { .wrap { padding: 24px 20px 60px; } }

  /* Header */
  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 28px; border-bottom: 1px solid var(--line); margin-bottom: 44px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 34px; height: 34px; background: var(--green); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .logo-name { font-weight: 600; font-size: 17px; color: var(--green); }
  .header-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--green); color: white; font-size: 14px; font-weight: 600;
    padding: 10px 20px; border-radius: var(--radius); text-decoration: none;
    transition: background 0.15s; white-space: nowrap;
  }
  .header-btn:hover { background: var(--green-mid); }

  /* Hero */
  .hero { margin-bottom: 40px; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards 0.1s; }
  .greeting {
    display: inline-block; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--green);
    background: var(--green-soft); padding: 4px 12px; border-radius: 20px; margin-bottom: 18px;
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif; font-size: clamp(30px, 5vw, 48px);
    font-weight: 800; line-height: 1.08; color: var(--ink); margin-bottom: 18px; letter-spacing: -0.02em;
  }
  .headline em { font-style: italic; color: var(--green); }
  .subhead { font-size: 18px; color: var(--muted); max-width: 560px; line-height: 1.6; margin-bottom: 28px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--green); color: white; font-size: 16px; font-weight: 600;
    padding: 15px 30px; border-radius: var(--radius); text-decoration: none;
    box-shadow: 0 2px 12px rgba(15,76,58,.25); transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--green-mid); transform: translateY(-2px); }

  .divider { height: 1px; background: var(--line); margin: 40px 0; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--green); margin-bottom: 20px; }

  /* Video */
  .video-section { margin-bottom: 44px; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards 0.2s; }
  .video-wrap {
    position: relative; width: 100%; border-radius: 10px; overflow: hidden;
    background: #000; border: 1px solid var(--line); box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .video-wrap video { width: 100%; height: auto; display: block; max-height: 480px; object-fit: contain; background: #000; }
  .video-caption { font-size: 13px; color: var(--light); margin-top: 10px; text-align: center; }

  /* Steps */
  .steps-section { margin-bottom: 44px; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards 0.3s; }
  .steps { display: flex; flex-direction: column; gap: 16px; }
  .step {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 18px 22px; border: 1px solid var(--line); border-radius: var(--radius);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .step:hover { border-color: rgba(15,76,58,.25); box-shadow: 0 2px 12px rgba(15,76,58,.06); }
  .step-num {
    width: 30px; height: 30px; border-radius: 50%; background: var(--green);
    color: white; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
  }
  .step-body h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .step-body p { font-size: 14px; color: var(--muted); line-height: 1.55; }

  /* Offer */
  .offer-block {
    background: var(--green); border-radius: 10px; padding: 36px 40px;
    margin-bottom: 44px; color: white;
    opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards 0.4s;
  }
  @media (max-width: 600px) { .offer-block { padding: 28px 24px; } }
  .offer-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,.6); margin-bottom: 14px; }
  .offer-block h2 {
    font-family: 'Fraunces', serif; font-size: clamp(22px, 4vw, 30px);
    font-weight: 800; line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.02em;
  }
  .offer-block p { font-size: 16px; color: rgba(255,255,255,.85); margin-bottom: 24px; max-width: 520px; line-height: 1.6; }
  .offer-tagline {
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; font-style: italic;
    color: rgba(255,255,255,.95); padding: 14px 20px;
    border: 1px solid rgba(255,255,255,.2); border-radius: var(--radius);
    display: inline-block; margin-bottom: 28px; background: rgba(255,255,255,.06);
  }
  .btn-white {
    display: inline-flex; align-items: center; gap: 8px;
    background: white; color: var(--green); font-size: 15px; font-weight: 700;
    padding: 13px 26px; border-radius: var(--radius); text-decoration: none;
    box-shadow: 0 2px 12px rgba(0,0,0,.15); transition: transform 0.1s;
  }
  .btn-white:hover { transform: translateY(-2px); }

  /* Calendar */
  .calendar-section { margin-bottom: 44px; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards 0.5s; }
  .calendar-intro h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .calendar-intro p { font-size: 15px; color: var(--muted); margin-bottom: 20px; }
  .calendar-frame { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .calendar-frame iframe { width: 100%; border: none; min-height: 700px; display: block; }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--line); padding-top: 32px;
    display: flex; align-items: flex-start; gap: 18px;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.6s;
  }
  .footer-photo {
    width: 52px; height: 52px; border-radius: 50%; background: var(--green);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 15px;
  }
  .footer-bio h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .footer-bio p { font-size: 13px; color: var(--light); line-height: 1.5; }
  .footer-bio a { color: var(--green); text-decoration: none; }

  /* Fallback */
  .fallback-wrap { max-width: 560px; margin: 80px auto; text-align: center; padding: 0 24px; }
  .fallback-wrap h2 { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 800; margin-bottom: 14px; }
  .fallback-wrap p { font-size: 17px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .loading p { font-size: 14px; color: var(--light); }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
</div>

<script>
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbze-VCrjgpV9x-F508krBC3aGFrZ2SVmBOAOrLcrwRx1yrDf8IKnm-tAoesDF0bp_x8EA/exec";
var CALENDAR_URL    = "https://links.optimsolutions.net/widget/booking/8HrNOngikKz4e6V7Rks3";
var WINSTON_EMAIL   = "winston@optimsolutions.net";
var VIDEO_URL       = "https://assets.cdn.filesafe.space/hoxZg0b04QBG5AjYWUZV/media/69e9a1e1a1636a6c655ebc88.mp4";

function getCode() {
  return (new URLSearchParams(window.location.search).get('c') || '').trim().toLowerCase();
}

function collectDeviceData() {
  var conn = navigator.connection || {};
  return {
    user_agent:    navigator.userAgent || "",
    screen:        screen.width + "x" + screen.height,
    viewport_w:    window.innerWidth,
    viewport_h:    window.innerHeight,
    language:      navigator.language || "",
    platform:      navigator.platform || "",
    color_depth:   screen.colorDepth || "",
    cookies:       navigator.cookieEnabled ? "yes" : "no",
    touch:         ('ontouchstart' in window) ? "yes" : "no",
    device_memory: navigator.deviceMemory || "",
    connection:    conn.effectiveType || "",
    timezone:      Intl.DateTimeFormat().resolvedOptions().timeZone || "",
    referrer:      document.referrer || "",
    current_url:   window.location.href,
    page_title:    document.title
  };
}

function logScan(code) {
  try {
    var d = collectDeviceData();
    var qs = "action=log&c=" + encodeURIComponent(code)
      + "&user_agent="  + encodeURIComponent(d.user_agent)
      + "&screen="      + encodeURIComponent(d.screen)
      + "&language="    + encodeURIComponent(d.language)
      + "&timezone="    + encodeURIComponent(d.timezone)
      + "&platform="    + encodeURIComponent(d.platform)
      + "&referrer="    + encodeURIComponent(d.referrer)
      + "&current_url=" + encodeURIComponent(d.current_url)
      + "&viewport_w="  + encodeURIComponent(d.viewport_w)
      + "&viewport_h="  + encodeURIComponent(d.viewport_h)
      + "&touch="       + encodeURIComponent(d.touch)
      + "&cookies="     + encodeURIComponent(d.cookies)
      + "&connection="  + encodeURIComponent(d.connection);
    new Image().src = APPS_SCRIPT_URL + "?" + qs;
  } catch(e) {}
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function calSvg(color) {
  color = color || 'currentColor';
  return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
}
function logoSvg() {
  return '<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>';
}

function renderPage(p) {
  var hasName   = p && p.firstName;
  var greeting  = hasName ? p.firstName + " \u2014 " + p.business : "Welcome";
  var headline  = hasName
    ? "Here\u2019s how we\u2019d help <em>" + esc(p.business) + "</em> book more jobs."
    : "Here\u2019s how we help duct cleaning companies book more jobs.";
  var subhead = hasName
    ? "A quick breakdown of exactly what we\u2019d focus on first for " + esc(p.business) + " \u2014 and why it moves the needle fast."
    : "A quick breakdown of exactly what we do \u2014 and why it moves the needle fast.";

  document.getElementById('app').innerHTML =
    '<div class="wrap">' +

    // Header
    '<header class="site-header">' +
    '<a href="#" class="logo"><div class="logo-icon">' + logoSvg() + '</div><span class="logo-name">OptimSolutions</span></a>' +
    '<a href="#calendar" class="header-btn">' + calSvg('white') + ' Book a 15-Minute Call</a>' +
    '</header>' +

    // Hero
    '<section class="hero">' +
    '<span class="greeting">' + esc(greeting) + '</span>' +
    '<h1 class="headline">' + headline + '</h1>' +
    '<p class="subhead">' + subhead + '</p>' +
    '<a href="#calendar" class="btn-primary">' + calSvg('white') + ' Book a 15-Minute Call</a>' +
    '</section>' +

    '<div class="divider"></div>' +

    // Video
    '<section class="video-section">' +
    '<p class="section-label">Watch first \u2014 2 minutes</p>' +
    '<div class="video-wrap"><video controls playsinline preload="metadata"><source src="' + VIDEO_URL + '" type="video/mp4">Your browser does not support video.</video></div>' +
    '<p class="video-caption">Watch the full breakdown \u2014 about 2 minutes</p>' +
    '</section>' +

    '<div class="divider"></div>' +

    // Steps
    '<section class="steps-section">' +
    '<p class="section-label">The system \u2014 how it works</p>' +
    '<div class="steps">' +
    '<div class="step"><div class="step-num">1</div><div class="step-body"><h3>Fix the capture problem first</h3><p>When a call goes unanswered, an automatic text fires back within seconds \u2014 before they call someone else. From that text they can book on their own, even at 11pm on a Sunday. Automatic reminders before every job kill no-shows. After every completed job, the system sends a Google review request automatically. Every job. Every time. Nobody on your team has to think about it.</p></div></div>' +
    '<div class="step"><div class="step-num">2</div><div class="step-body"><h3>Reactivate your existing customer base</h3><p>Most duct cleaning companies have 2\u20133 years of past customers sitting dormant. We build automated follow-up sequences that bring those customers back before they go looking for someone else. Reactivating an existing customer costs a fraction of acquiring a new one.</p></div></div>' +
    '<div class="step"><div class="step-num">3</div><div class="step-body"><h3>Scale with AI-optimized advertising</h3><p>Once the capture system is running, we run paid ads on Facebook and Google on your behalf. We run dozens of variations simultaneously \u2014 different creatives, audiences, offers, and geographies \u2014 and use AI to continuously identify what\u2019s generating the lowest cost per booked job. Winners get more budget. Losers get cut automatically. Because the capture system is already in place, every lead gets followed up with immediately. Nothing falls through.</p></div></div>' +
    '</div></section>' +

    // Offer
    '<section class="offer-block">' +
    '<p class="offer-label">The offer</p>' +
    '<h2>We set a goal together. Then we go get it.</h2>' +
    '<p>In our first conversation, we set a specific goal together based on where your business actually is right now. If we don\u2019t hit that goal within the first 30 days, we keep working at no charge until we do.</p>' +
    '<div class="offer-tagline">The goal is yours. The risk is ours.</div><br>' +
    '<a href="#calendar" class="btn-white">' + calSvg('var(--green)') + ' Book a 15-Minute Call</a>' +
    '</section>' +

    // Calendar
    '<section class="calendar-section" id="calendar">' +
    '<div class="calendar-intro">' +
    '<p class="section-label">Book your call</p>' +
    '<h3>Pick a time that works for you.</h3>' +
    '<p>No pitch deck. No pressure. Just a real conversation about what this looks like for your business.</p>' +
    '</div>' +
    '<div class="calendar-frame"><iframe src="' + CALENDAR_URL + '" scrolling="yes" loading="lazy" title="Book a call with Winston"></iframe></div>' +
    '</section>' +

    '<div class="divider"></div>' +

    // Footer
    '<footer class="site-footer">' +
    '<div class="footer-photo">WG</div>' +
    '<div class="footer-bio">' +
    '<h4>Winston Gasch</h4>' +
    '<p>Founder, OptimSolutions &middot; Memphis-based &middot; Eagle Scout &middot; Grizzlies fan<br>I work exclusively with duct cleaning companies. &middot; <a href="mailto:' + WINSTON_EMAIL + '">winston@optimsolutions.net</a></p>' +
    '</div></footer>' +
    '</div>';
}

function renderFallback() {
  document.getElementById('app').innerHTML =
    '<div class="fallback-wrap">' +
    '<h2>We help duct cleaning companies book more jobs.</h2>' +
    '<p>If you received a letter from Winston, scan the QR code on it to see your personalized page. Or reach out directly.</p>' +
    '<a href="mailto:' + WINSTON_EMAIL + '" class="btn-primary" style="margin:0 auto">Get in touch</a>' +
    '</div>';
}

// Boot — fetch from Apps Script (no CSP issues on GitHub Pages)
(function boot() {
  var code = getCode();
  if (!code) { renderFallback(); return; }

  fetch(APPS_SCRIPT_URL + "?action=lookup&c=" + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      renderPage(data && data.found ? data : {});
      logScan(code);
    })
    .catch(function() {
      renderPage({});
    });
})();
</script>
</body>
</html>
